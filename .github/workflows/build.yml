name: Build & Release

# Runs when you push a version tag (e.g. v1.0.1) or trigger it manually.
# Builds the Windows installer on a Windows runner and the macOS .dmg on a
# real macOS runner (GitHub provides these free for public repos), then
# publishes both to a GitHub Release matching the version in package.json.
on:
  workflow_dispatch: {}
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      # IMPORTANT: run one platform at a time. If macOS and Windows publish in
      # parallel they can BOTH create the GitHub release for the tag at the same
      # instant, producing two duplicate releases with the assets split between
      # them (that's why the Windows .exe "went missing"). Serializing means the
      # first job creates the release and the second uploads into that same one.
      max-parallel: 1
      matrix:
        include:
          - os: macos-latest
            name: macOS
          - os: windows-latest
            name: Windows
    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.name }})
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Ensure the GitHub release exists
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          # Create the release up-front (idempotent). electron-builder otherwise
          # tries to CREATE the release itself — and it fires two publishers (zip
          # + dmg / nsis + portable) that race to create the same tag, so the
          # loser gets a 422 "already_exists" and the job fails. If the release
          # already exists, both publishers just upload into it.
          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" --title "$TAG" --notes "Club Sandwich Streaming $TAG"

      - name: Build & publish
        run: npm run release
        env:
          # electron-builder reads GH_TOKEN to upload release assets.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
